name: Deploy Laravel with Docker

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Build Docker image
        run: docker build -t my-laravel-app .

      - name: Save Docker image
        run: docker save my-laravel-app | gzip > my-laravel-app.tar.gz

      - name: Copy files to server
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          source: "my-laravel-app.tar.gz,nginx.conf"
          target: "/home/ubuntu"

      - name: Deploy to server
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            cd /home/ubuntu
            docker load < my-laravel-app.tar.gz
            docker stop puskesmas-app || true
            docker rm puskesmas-app || true
            mkdir -p /home/ubuntu/app
            docker run --rm -v /home/ubuntu/app:/backup my-laravel-app:latest sh -c "cp -r /var/www/* /backup/"
            docker run -d \
              --name puskesmas-app \
              --restart unless-stopped \
              -p 9000:9000 \
              -v /home/ubuntu/app:/var/www \
              -v /home/ubuntu/.env:/var/www/.env \
              my-laravel-app:latest
            sleep 5
            docker exec puskesmas-app php artisan migrate --force
            docker exec puskesmas-app php artisan db:seed --force
            docker exec puskesmas-app php artisan config:cache
            docker exec puskesmas-app php artisan route:cache
            sudo chown -R www-data:www-data /home/ubuntu/app/storage /home/ubuntu/app/bootstrap/cache || true
            sudo chmod -R 775 /home/ubuntu/app/storage /home/ubuntu/app/bootstrap/cache || true
            sudo cp /home/ubuntu/nginx.conf /etc/nginx/sites-available/laravel
            sudo ln -sf /etc/nginx/sites-available/laravel /etc/nginx/sites-enabled/laravel
            sudo rm -f /etc/nginx/sites-enabled/default
            sudo nginx -t && sudo systemctl restart nginx
            docker image prune -f
            rm -f my-laravel-app.tar.gz